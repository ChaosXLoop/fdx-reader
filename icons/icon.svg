<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="76" fill="#0c0c0e"/>
  <circle cx="256" cy="200" r="160" fill="rgba(201,162,39,0.08)"/>
  <!-- Page shadow -->
  <rect x="133" y="73" width="260" height="290" rx="4" fill="rgba(0,0,0,0.35)"/>
  <!-- Page -->
  <rect x="126" y="66" width="260" height="290" rx="4" fill="#1e1e22" stroke="#3a3a42" stroke-width="2"/>
  <!-- Text lines -->
  <g fill="#5a5a60">
    <rect x="155" y="96" width="200" height="8" rx="2"/>
    <rect x="155" y="118" width="170" height="8" rx="2"/>
    <rect x="185" y="144" width="110" height="8" rx="2"/>
    <rect x="175" y="166" width="130" height="8" rx="2"/>
    <rect x="155" y="192" width="190" height="8" rx="2"/>
    <rect x="155" y="214" width="150" height="8" rx="2"/>
    <rect x="190" y="240" width="100" height="8" rx="2"/>
    <rect x="180" y="262" width="120" height="8" rx="2"/>
    <rect x="155" y="288" width="180" height="8" rx="2"/>
    <rect x="155" y="310" width="140" height="8" rx="2"/>
  </g>
  <!-- Pencil -->
  <g transform="translate(330, 260) rotate(35)">
    <rect x="0" y="0" width="14" height="100" rx="2" fill="#c9a227"/>
    <rect x="0" y="0" width="14" height="20" rx="2" fill="#b08c1f"/>
    <polygon points="0,100 14,100 7,118" fill="#e8e6e3"/>
  </g>
  <!-- Small note indicator -->
  <circle cx="370" cy="160" r="16" fill="#ef4444" opacity="0.9"/>
  <!-- FDX label -->
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="56" fill="#c9a227">FDX</text>
  <text x="256" y="478" text-anchor="middle" font-family="monospace" font-size="28" fill="#6a6a6e">READER</text>
</svg>
